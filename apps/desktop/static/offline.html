<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>lostbae — Offline</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f2;
      font-family: -apple-system, "Segoe UI", Inter, sans-serif;
      color: #1e2d24;
    }
    .card {
      background: #fff;
      border-radius: 1.5rem;
      padding: 3rem 3.5rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(30, 45, 36, 0.08);
      max-width: 420px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
    p { color: #6b7f73; margin: 0 0 1.75rem; line-height: 1.5; }
    button {
      background: #059669;
      color: #fff;
      border: 0;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    button:hover { transform: scale(1.05); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d97706; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>You're offline</h1>
    <p>lostbae needs an internet connection. We'll reconnect automatically as soon as you're back online.</p>
    <button onclick="location.replace(window.__TARGET__ || 'https://www.lostbae.com')">Retry now</button>
  </div>
  <script>
    // Auto-reconnect: probe connectivity every 5s and reload when back.
    setInterval(function () {
      if (navigator.onLine) {
        fetch('https://www.lostbae.com', { mode: 'no-cors', cache: 'no-store' })
          .then(function () { location.replace('https://www.lostbae.com'); })
          .catch(function () {});
      }
    }, 5000);
  </script>
</body>
</html>
